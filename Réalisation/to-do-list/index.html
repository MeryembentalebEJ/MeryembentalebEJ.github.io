<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list in JQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css folder/bootstrap.min.css">
    <link rel="stylesheet" href="css folder/style.css">
</head>
<body>
    <nav class="navbar navbar-light ">
        <div class="container">
          <a class="navbar-brand" href="#">Welcome to Meryem's <span>To Do List</span>
            <i class="fa fa-smile-o" style="font-size:30px"></i></a>
        </div>
      </nav>
      <div class="container">
          <div class="row d-flex justify-content-center">
              <div class="col-md-10">
                <div class="intro">
                    <h1 class="text-center">Hello! <br>What are your plans for today? <br><i class="fa fa-calendar-check-o" style="font-size:48px"></i></h1>
                    <button>Start</button>
                  </div>
              </div>
          </div>
      </div>
    <div class="container ">
        <div class="row d-flex justify-content-center">
            <div class="col-md-10">
                <div class="containerOne fadeOut">
                    <input type="text" class="text-note" placeholder="Add a task please!">
                    <div class="notCompleted">
                        <h2>Not Completed</h2>
                    </div>
                    <div class="completed">
                        <h2>Completed</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>


<script src="https://code.jquery.com/jquery-3.6.0.min.js"
  integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
  crossorigin="anonymous"></script>
<script src="js/app.js"></script>

</body>
</html>
